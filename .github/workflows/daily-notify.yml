name: 🔔 소비기한 알림 메일 발송

on:
  schedule:
    # KST 오전 9시 = UTC 00:00 (GitHub 지연 대비로 00:00 / 00:30 / 01:00 세 번 시도)
    # 중복 발송은 API에서 자동 차단됨
    - cron: '0 0 * * *'
    - cron: '30 0 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:
    # GitHub Actions 탭에서 수동 테스트 가능

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Call notify API
        run: |
          RESPONSE=$(curl -s -o response.txt -w "%{http_code}" \
            -X GET \
            "https://my-fridge-sophie-e-s-projects.vercel.app/api/notify")

          echo "HTTP Status: $RESPONSE"
          echo "Response:"
          cat response.txt

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ API 호출 실패 (HTTP $RESPONSE)"
            exit 1
          fi

          echo "✅ 완료"
