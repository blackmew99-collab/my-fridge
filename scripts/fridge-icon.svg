<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 파스텔 핑크 -->
  <rect width="512" height="512" rx="115" fill="#fde8f2"/>

  <!-- 냉장고 그림자 -->
  <rect x="132" y="82" width="256" height="364" rx="52" fill="#a8d4f0" opacity="0.3"/>

  <!-- 냉장고 본체 전체 -->
  <rect x="124" y="72" width="256" height="364" rx="52" fill="#daeef9" stroke="#a8d4f0" stroke-width="5"/>

  <!-- 냉동칸 (상단, 약 40%) -->
  <rect x="124" y="72" width="256" height="152" rx="52" fill="#eaf6fd" stroke="#a8d4f0" stroke-width="5"/>
  <!-- 냉동칸 하단 직선 처리 -->
  <rect x="124" y="192" width="256" height="18" fill="#eaf6fd"/>
  <!-- 구분선 -->
  <rect x="140" y="206" width="224" height="6" rx="3" fill="#a8d4f0" opacity="0.7"/>

  <!-- 냉동칸 손잡이 (둥글고 귀엽게) -->
  <rect x="206" y="118" width="100" height="20" rx="10" fill="#7bbde0"/>
  <rect x="214" y="121" width="48" height="7" rx="4" fill="#ffffff" opacity="0.55"/>

  <!-- 냉동칸 눈결정 (동그란 느낌) -->
  <circle cx="178" cy="162" r="18" fill="#c2e4f5" opacity="0.8"/>
  <line x1="178" y1="150" x2="178" y2="174" stroke="#7bbde0" stroke-width="4" stroke-linecap="round"/>
  <line x1="166" y1="156" x2="190" y2="168" stroke="#7bbde0" stroke-width="4" stroke-linecap="round"/>
  <line x1="190" y1="156" x2="166" y2="168" stroke="#7bbde0" stroke-width="4" stroke-linecap="round"/>

  <!-- 냉장칸 손잡이 -->
  <rect x="206" y="306" width="100" height="20" rx="10" fill="#7bbde0"/>
  <rect x="214" y="309" width="48" height="7" rx="4" fill="#ffffff" opacity="0.55"/>

  <!-- 냉장칸 내부 선반 -->
  <rect x="148" y="364" width="208" height="6" rx="3" fill="#a8d4f0" opacity="0.5"/>

  <!-- 냉장칸 귀여운 장식 (동그란 과일들) -->
  <circle cx="178" cy="348" r="16" fill="#b5e0f7" opacity="0.9"/>
  <circle cx="212" cy="340" r="12" fill="#ffe0b2" opacity="0.85"/>
  <circle cx="200" cy="358" r="10" fill="#c8f5c8" opacity="0.85"/>

  <!-- 냉장고 하단 받침대 -->
  <rect x="174" y="428" width="160" height="18" rx="9" fill="#a8d4f0" opacity="0.6"/>

  <!-- 본체 왼쪽 하이라이트 (귀여운 광택) -->
  <rect x="136" y="96" width="10" height="300" rx="5" fill="#ffffff" opacity="0.45"/>

  <!-- 상단 하이라이트 -->
  <ellipse cx="252" cy="90" rx="70" ry="10" fill="#ffffff" opacity="0.3"/>
</svg>
