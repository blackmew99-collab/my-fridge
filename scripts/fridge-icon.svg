<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 파스텔 핑크 -->
  <rect width="512" height="512" rx="115" fill="#fde8f2"/>

  <!-- ── 냉장고 내부 (크림 베이지) ── -->
  <rect x="88" y="52" width="258" height="402" rx="22" fill="#fff6d6"/>

  <!-- 선반 1 -->
  <rect x="88" y="198" width="258" height="16" fill="#1a1a1a"/>
  <!-- 선반 2 -->
  <rect x="88" y="314" width="258" height="16" fill="#1a1a1a"/>

  <!-- ── 칸 1: 틸 그릇 ── -->
  <!-- 그릇 (위가 넓은 반원) -->
  <ellipse cx="222" cy="162" rx="62" ry="22" fill="#2ec4a0"/>
  <path d="M160 162 Q160 128 222 128 Q284 128 284 162 Z" fill="#3dd4b0" stroke="#1a1a1a" stroke-width="9" stroke-linejoin="round"/>
  <ellipse cx="222" cy="162" rx="62" ry="22" fill="#2ec4a0" stroke="#1a1a1a" stroke-width="9"/>

  <!-- ── 칸 2: 파란 병 ── -->
  <!-- 병 몸통 -->
  <rect x="204" y="232" width="40" height="66" rx="12" fill="#72c6f0" stroke="#1a1a1a" stroke-width="9"/>
  <!-- 병 목 -->
  <rect x="215" y="215" width="18" height="24" rx="6" fill="#72c6f0" stroke="#1a1a1a" stroke-width="9"/>
  <!-- 병 뚜껑 -->
  <rect x="215" y="207" width="18" height="12" rx="5" fill="#1a1a1a"/>

  <!-- ── 칸 3: 오렌지 접시 + 파란 병 ── -->
  <!-- 오렌지 원형 접시 -->
  <circle cx="155" cy="362" r="42" fill="#f07830" stroke="#1a1a1a" stroke-width="9"/>
  <circle cx="155" cy="362" r="28" fill="#f89040" opacity="0.5"/>
  <!-- 작은 파란 병 -->
  <rect x="225" y="334" width="32" height="54" rx="10" fill="#72c6f0" stroke="#1a1a1a" stroke-width="8"/>
  <rect x="234" y="320" width="14" height="20" rx="5" fill="#72c6f0" stroke="#1a1a1a" stroke-width="8"/>
  <rect x="234" y="313" width="14" height="11" rx="4" fill="#1a1a1a"/>

  <!-- ── 냉장고 본체 외곽선 ── -->
  <rect x="88" y="52" width="258" height="402" rx="22" fill="none" stroke="#1a1a1a" stroke-width="13"/>

  <!-- ── 문 (오른쪽으로 열린) ── -->
  <rect x="344" y="62" width="72" height="372" rx="18" fill="#cccccc" stroke="#1a1a1a" stroke-width="11"/>
  <!-- 문 안쪽 패널 느낌 -->
  <rect x="354" y="80" width="52" height="335" rx="10" fill="#d8d8d8"/>

  <!-- 경첩 위 -->
  <rect x="332" y="82" width="22" height="20" rx="5" fill="#999" stroke="#1a1a1a" stroke-width="7"/>
  <!-- 경첩 아래 -->
  <rect x="332" y="400" width="22" height="20" rx="5" fill="#999" stroke="#1a1a1a" stroke-width="7"/>

  <!-- 문 손잡이 (파란 원형) -->
  <circle cx="360" cy="248" r="22" fill="#5ab4f0" stroke="#1a1a1a" stroke-width="9"/>

  <!-- ── 냉장고 발 ── -->
  <rect x="118" y="452" width="34" height="16" rx="7" fill="#aaa" stroke="#1a1a1a" stroke-width="6"/>
  <rect x="282" y="452" width="34" height="16" rx="7" fill="#aaa" stroke="#1a1a1a" stroke-width="6"/>
</svg>
