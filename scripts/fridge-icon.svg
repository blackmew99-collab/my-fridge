<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 파스텔 핑크 라운드 사각형 -->
  <rect width="512" height="512" rx="110" fill="#fde8f2"/>

  <!-- 냉장고 본체 그림자 -->
  <rect x="128" y="74" width="260" height="374" rx="30" fill="#f0b8d4" opacity="0.4"/>

  <!-- 냉장고 본체 -->
  <rect x="122" y="68" width="260" height="374" rx="30" fill="#fff8fb" stroke="#f9a8c9" stroke-width="5"/>

  <!-- 냉동칸 (상단) 배경 -->
  <rect x="122" y="68" width="260" height="145" rx="30" fill="#fef0f7" stroke="#f9a8c9" stroke-width="5"/>
  <!-- 냉동칸 하단 직선 처리 -->
  <rect x="122" y="178" width="260" height="16" fill="#fef0f7"/>
  <rect x="122" y="188" width="260" height="6" fill="#f9a8c9" opacity="0.6"/>

  <!-- 냉동칸 손잡이 -->
  <rect x="214" y="110" width="88" height="16" rx="8" fill="#f9a8c9"/>
  <!-- 손잡이 광택 -->
  <rect x="222" y="113" width="40" height="5" rx="3" fill="#ffffff" opacity="0.6"/>

  <!-- 냉동칸 눈결정 아이콘 (단순 도형) -->
  <line x1="175" y1="148" x2="175" y2="172" stroke="#f9a8c9" stroke-width="5" stroke-linecap="round"/>
  <line x1="163" y1="154" x2="187" y2="166" stroke="#f9a8c9" stroke-width="5" stroke-linecap="round"/>
  <line x1="187" y1="154" x2="163" y2="166" stroke="#f9a8c9" stroke-width="5" stroke-linecap="round"/>
  <circle cx="175" cy="160" r="5" fill="#f9a8c9"/>

  <!-- 냉장칸 손잡이 -->
  <rect x="214" y="296" width="88" height="16" rx="8" fill="#f9a8c9"/>
  <!-- 손잡이 광택 -->
  <rect x="222" y="299" width="40" height="5" rx="3" fill="#ffffff" opacity="0.6"/>

  <!-- 냉장칸 내부 선반 선 -->
  <line x1="148" y1="358" x2="366" y2="358" stroke="#f9a8c9" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- 냉장칸 작은 원형 장식 (과일/야채 느낌) -->
  <circle cx="175" cy="340" r="14" fill="#ffb3c6" opacity="0.7"/>
  <circle cx="205" cy="332" r="10" fill="#a8e6cf" opacity="0.7"/>
  <circle cx="195" cy="350" r="8"  fill="#ffd3a5" opacity="0.7"/>

  <!-- 냉장고 하단 받침대 -->
  <rect x="170" y="434" width="176" height="18" rx="9" fill="#f9a8c9" opacity="0.5"/>

  <!-- 본체 왼쪽 하이라이트 -->
  <rect x="130" y="88" width="8" height="320" rx="4" fill="#ffffff" opacity="0.5"/>
</svg>
