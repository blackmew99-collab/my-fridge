<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 배경: 파스텔 민트 라운드 사각형 -->
  <rect width="512" height="512" rx="110" fill="#d4f0e8"/>

  <!-- 냉장고 본체 -->
  <rect x="120" y="60" width="272" height="392" rx="28" fill="#ffffff" stroke="#b2ddd0" stroke-width="6"/>

  <!-- 냉동칸 (상단) -->
  <rect x="120" y="60" width="272" height="148" rx="28" fill="#e8f7f3" stroke="#b2ddd0" stroke-width="6"/>
  <!-- 냉동칸 하단 경계선 (직선으로 자연스럽게) -->
  <rect x="120" y="176" width="272" height="12" fill="#b2ddd0"/>

  <!-- 냉장칸 (하단) -->
  <rect x="120" y="188" width="272" height="264" rx="0" fill="#f7fdfc"/>
  <rect x="120" y="424" width="272" height="28" rx="28" fill="#f7fdfc" stroke="#b2ddd0" stroke-width="0"/>

  <!-- 냉동칸 손잡이 -->
  <rect x="220" y="108" width="72" height="14" rx="7" fill="#8ecfc2"/>

  <!-- 냉장칸 손잡이 -->
  <rect x="220" y="288" width="72" height="14" rx="7" fill="#8ecfc2"/>

  <!-- 냉동칸 온도 표시 (작은 눈결정) -->
  <text x="175" y="155" font-size="36" text-anchor="middle" fill="#a0d8cc">❄</text>

  <!-- 냉장칸 야채/과일 표시 -->
  <text x="175" y="335" font-size="36" text-anchor="middle" fill="#b5e8c8">🥕</text>

  <!-- 하단 받침대 -->
  <rect x="150" y="444" width="212" height="20" rx="10" fill="#c5e8df"/>

  <!-- 왼쪽 테두리 강조 -->
  <rect x="120" y="60" width="6" height="392" rx="3" fill="#b2ddd0" opacity="0.5"/>
</svg>
